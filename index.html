<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devCha</title>
    <link href="./src/output.css" rel="stylesheet">
    <style>
        /* Desktop styles */
        .chat-messages {
            height: calc(100vh - 200px);
            max-height: 600px;
        }
        
        /* Mobile responsive styles */
        @media (max-width: 640px) {
            .chat-messages {
                height: calc(100vh - 220px);
                max-height: none;
            }
            
            /* Adjust header spacing */
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .header-buttons {
                width: 100%;
                justify-content: space-between;
            }
            
            /* Smaller buttons on mobile */
            .mobile-btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }
            
            /* Adjust form layouts */
            .form-container {
                padding: 1rem;
            }
            
            /* Message input adjustments */
            .message-input-container {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .action-buttons {
                justify-content: space-around;
            }
            
            /* File and voice previews */
            .preview-container {
                margin-bottom: 0.5rem;
            }
            
            /* Search bar */
            .search-container {
                padding: 0.75rem;
            }
            
            /* Members list */
            .members-container {
                padding: 0.75rem;
            }
            
            /* Chat message adjustments */
            .message-content {
                max-width: 85%;
            }
            
            /* File attachment display */
            .file-attachment {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .file-attachment button {
                margin-top: 0.5rem;
                width: 100%;
            }
            
            /* Voice note display */
            .voice-note {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .voice-note audio {
                width: 100%;
                margin-top: 0.5rem;
            }
            
            /* Adjust modal dialogs */
            .modal-content {
                margin: 1rem;
                max-width: calc(100% - 2rem);
            }
        }
        
        @media (max-width: 480px) {
            /* Extra small screens */
            .chat-messages {
                height: calc(100vh - 240px);
            }
            
            .form-container {
                padding: 0.75rem;
            }
            
            .message-content {
                max-width: 90%;
            }
            
            /* Even smaller buttons */
            .mobile-btn {
                padding: 0.375rem 0.625rem;
                font-size: 0.8rem;
            }
            
            /* Adjust text sizes */
            .text-responsive {
                font-size: 0.875rem;
            }
        }
        
        /* Touch-friendly adjustments */
        @media (hover: none) and (pointer: coarse) {
            /* Touch devices */
            .btn-touch {
                min-height: 44px;
                min-width: 44px;
            }
            
            input, textarea {
                min-height: 44px;
            }
            
            /* Increase tap targets */
            .delete-btn {
                padding: 0.5rem;
                min-width: 44px;
                min-height: 44px;
            }
        }
        
        /* Landscape mobile adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            .chat-messages {
                height: calc(100vh - 160px);
            }
            
            .form-container {
                padding: 0.5rem;
            }
            
            .preview-container {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- Registration Page -->
    <div id="registerPage" class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-lg p-4 sm:p-8 border border-gray-200 form-container">
                <h2 class="text-xl sm:text-2xl font-bold text-center mb-2 text-gray-800 text-responsive">Welcome to devCha</h2>
                <p class="text-center text-gray-600 mb-6">Create your account to start chatting</p>
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="regFullName" required 
                               class="w-full px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent btn-touch">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="regUsername" required 
                               class="w-full px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent btn-touch">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="regPassword" required 
                               class="w-full px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent btn-touch">
                    </div>
                    <button type="submit" 
                            class="w-full bg-blue-600 text-white py-3 sm:py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-medium btn-touch">
                        Register
                    </button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <button onclick="showLogin()" class="text-blue-600 hover:text-blue-800 font-medium">Login</button>
                    </p>
                </div>
                <div id="regError" class="mt-4 text-red-600 text-sm text-center hidden"></div>
            </div>
        </div>
    </div>

    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center px-4 py-8 hidden">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-lg p-4 sm:p-8 border border-gray-200 form-container">
                <h2 class="text-xl sm:text-2xl font-bold text-center mb-6 text-gray-800 text-responsive">Login</h2>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="loginUsername" required 
                               class="w-full px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent btn-touch">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="loginPassword" required 
                               class="w-full px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent btn-touch">
                    </div>
                    <button type="submit" 
                            class="w-full bg-green-600 text-white py-3 sm:py-2 px-4 rounded-md hover:bg-green-700 transition duration-200 font-medium btn-touch">
                        Login
                    </button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-600">
                        Don't have an account? 
                        <button onclick="showRegister()" class="text-green-600 hover:text-green-800 font-medium">Register</button>
                    </p>
                </div>
                <div id="loginError" class="mt-4 text-red-600 text-sm text-center hidden"></div>
            </div>
        </div>
    </div>

    <!-- Chat Page -->
    <div id="chatPage" class="min-h-screen flex flex-col hidden">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-3 py-2 sm:px-6 sm:py-3">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between header-content">
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <h1 class="text-lg sm:text-xl font-bold text-gray-800 text-responsive">devCha</h1>
                    <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-3">
                        <span class="text-xs sm:text-sm text-gray-600">Welcome, <span id="currentUser" class="font-medium"></span></span>
                        <span class="text-xs sm:text-sm text-blue-600 font-medium">(<span id="membersCount">0</span> members)</span>
                    </div>
                </div>
                <div class="flex items-center space-x-2 mt-2 sm:mt-0 header-buttons">
                    <button onclick="toggleMembersList()" 
                            class="bg-blue-600 text-white px-2 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-blue-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                        Members
                    </button>
                    <button onclick="logout()" 
                            class="bg-red-600 text-white px-2 py-2 sm:px-4 sm:py-2 rounded-md hover:bg-red-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                        Logout
                    </button>
                </div>
            </div>
            <!-- Members List -->
            <div id="membersList" class="hidden border-t border-gray-200 px-3 py-2 sm:px-4 sm:py-3 bg-gray-50 members-container">
                <h3 class="text-xs sm:text-sm font-semibold text-gray-700 mb-2">All Members:</h3>
                <div id="membersContainer" class="flex flex-wrap gap-1 sm:gap-2">
                    <!-- Members will be added here -->
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="bg-white border-b border-gray-200 px-3 py-2 sm:px-6 sm:py-3 search-container">
            <div class="flex items-center space-x-2">
                <input type="text" id="searchInput" 
                       placeholder="Search messages or users..." 
                       class="flex-1 px-3 py-2 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent btn-touch">
                <button onclick="clearSearch()" 
                        class="bg-gray-500 text-white px-2 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-gray-600 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                    Clear
                </button>
            </div>
        </div>

        <!-- Chat Messages -->
        <main class="flex-1 overflow-hidden px-4 py-4 sm:px-6">
            <div id="chatMessages" class="chat-messages overflow-y-auto space-y-3 px-2">
                <!-- Messages will be added here -->
            </div>
        </main>

        <!-- Message Input -->
        <footer class="bg-white border-t border-gray-200 px-3 py-3 sm:px-6 sm:py-4">
            <!-- File Upload Preview -->
            <div id="filePreview" class="hidden mb-2 sm:mb-3 p-2 sm:p-3 bg-gray-50 rounded-lg border border-gray-200 preview-container">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div id="fileInfo" class="text-xs sm:text-sm text-gray-600 mb-2 sm:mb-0"></div>
                    <button onclick="clearFile()" class="text-red-600 hover:text-red-800 text-xs sm:text-sm btn-touch">Remove</button>
                </div>
            </div>
            
            <!-- Voice Recording Preview -->
            <div id="voicePreview" class="hidden mb-2 sm:mb-3 p-2 sm:p-3 bg-gray-50 rounded-lg border border-gray-200 preview-container">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div id="voiceInfo" class="text-xs sm:text-sm text-gray-600 mb-2 sm:mb-0">Voice note recorded</div>
                    <button onclick="clearVoice()" class="text-red-600 hover:text-red-800 text-xs sm:text-sm btn-touch">Remove</button>
                </div>
                <audio id="voiceAudio" controls class="mt-2 w-full"></audio>
            </div>
            
            <!-- Video Recording Preview -->
            <div id="videoPreview" class="hidden mb-2 sm:mb-3 p-2 sm:p-3 bg-gray-50 rounded-lg border border-gray-200 preview-container">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div id="videoInfo" class="text-xs sm:text-sm text-gray-600 mb-2 sm:mb-0">Video recorded</div>
                    <button onclick="clearVideo()" class="text-red-600 hover:text-red-800 text-xs sm:text-sm btn-touch">Remove</button>
                </div>
                <video id="videoPreviewPlayer" controls class="mt-2 w-full max-h-64 rounded"></video>
            </div>
            
            <form id="messageForm" class="space-y-2 sm:space-y-3">
                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 message-input-container">
                    <input type="text" id="messageInput" 
                           placeholder="Type your message..." 
                           class="flex-1 px-3 py-3 sm:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent btn-touch">
                    <button type="submit" 
                            class="bg-blue-600 text-white px-4 py-3 sm:py-2 rounded-md hover:bg-blue-700 transition duration-200 font-medium btn-touch">
                        Send
                    </button>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex justify-around sm:justify-start sm:space-x-2 action-buttons">
                    <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.txt" class="hidden">
                    <button type="button" onclick="document.getElementById('fileInput').click()" 
                            class="bg-green-600 text-white px-3 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-green-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                        🗃️ Send File(s)
                    </button>
                    
                    <button type="button" id="recordButton" onclick="toggleRecording()" 
                            class="bg-orange-500 text-white px-3 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-orange-600 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                        🎙️ voice message
                    </button>
                    
                    <button type="button" id="videoRecordButton" onclick="toggleVideoRecording()" 
                            class="bg-purple-600 text-white px-3 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-purple-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch">
                        🎥videoChat
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script>
        // Local Storage Keys
        const USERS_KEY = 'chatUsers';
        const MESSAGES_KEY = 'chatMessages';
        const CURRENT_USER_KEY = 'currentUser';

        // Global variables for file, voice, and video
        let selectedFile = null;
        let voiceBlob = null;
        let videoBlob = null;
        let mediaRecorder = null;
        let videoRecorder = null;
        let isRecording = false;
        let isVideoRecording = false;
        let allMessages = [];

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('messageForm').addEventListener('submit', handleMessage);
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        function checkExistingSession() {
            const currentUser = localStorage.getItem(CURRENT_USER_KEY);
            if (currentUser) {
                showChatPage();
                loadMessages();
            } else {
                showRegister();
            }
        }

        function showRegister() {
            document.getElementById('registerPage').classList.remove('hidden');
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('chatPage').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('chatPage').classList.add('hidden');
        }

        function showChatPage() {
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('chatPage').classList.remove('hidden');
            
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            document.getElementById('currentUser').textContent = currentUser.username;
            
            updateMembersCount();
            loadMembersList();
        }

        function handleRegister(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('regFullName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            const errorDiv = document.getElementById('regError');
            errorDiv.classList.add('hidden');
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            
            // Check if username already exists
            if (users.find(user => user.username === username)) {
                errorDiv.textContent = 'Username already exists. Please choose another one.';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            // Add new user
            const newUser = { fullName, username, password };
            users.push(newUser);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            
            // Set current user session
            localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(newUser));
            
            // Clear form
            document.getElementById('registerForm').reset();
            
            // Show chat page
            showChatPage();
            loadMessages();
            
            // Add join message
            addJoinMessage(newUser.username);
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('hidden');
            
            // Get users
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            
            // Find user
            const user = users.find(u => u.username === username && u.password === password);
            
            if (!user) {
                errorDiv.textContent = 'Invalid username or password.';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            // Set current user session
            localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            
            // Clear form
            document.getElementById('loginForm').reset();
            
            // Show chat page
            showChatPage();
            loadMessages();
        }

        function logout() {
            localStorage.removeItem(CURRENT_USER_KEY);
            showLogin();
        }

        function addJoinMessage(username) {
            const messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
            const joinMessage = {
                id: Date.now(),
                username: 'system',
                fullName: 'System',
                message: `${username} joined the room 📢🎉`,
                timestamp: new Date().toISOString(),
                isSystemMessage: true
            };
            
            messages.push(joinMessage);
            localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
            displayMessage(joinMessage);
            scrollToBottom();
        }

        function handleMessage(e) {
            e.preventDefault();
            
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();
            
            // Check if there's any content to send
            if (!messageText && !selectedFile && !voiceBlob && !videoBlob) return;
            
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            
            // Get existing messages
            const messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
            
            // Create message object
            const newMessage = {
                id: Date.now(),
                username: currentUser.username,
                fullName: currentUser.fullName,
                message: messageText,
                timestamp: new Date().toISOString(),
                messageType: 'text',
                fileAttachment: null,
                voiceNote: null
            };
            
            // Handle file attachment
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newMessage.fileAttachment = {
                        name: selectedFile.name,
                        type: selectedFile.type,
                        size: selectedFile.size,
                        data: e.target.result
                    };
                    newMessage.messageType = 'file';
                    saveAndDisplayMessage(messages, newMessage);
                };
                reader.readAsDataURL(selectedFile);
                return;
            }
            
            // Handle voice note
            if (voiceBlob) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newMessage.voiceNote = {
                        data: e.target.result,
                        type: voiceBlob.type
                    };
                    newMessage.messageType = 'voice';
                    saveAndDisplayMessage(messages, newMessage);
                };
                reader.readAsDataURL(voiceBlob);
                return;
            }
            
            // Handle video recording
            if (videoBlob) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newMessage.videoAttachment = {
                        data: e.target.result,
                        type: videoBlob.type
                    };
                    newMessage.messageType = 'video';
                    saveAndDisplayMessage(messages, newMessage);
                };
                reader.readAsDataURL(videoBlob);
                return;
            }
            
            // Text message
            saveAndDisplayMessage(messages, newMessage);
        }

        function saveAndDisplayMessage(messages, newMessage) {
            messages.push(newMessage);
            localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
            
            // Clear inputs
            document.getElementById('messageInput').value = '';
            clearFile();
            clearVoice();
            clearVideo();
            
            // Update all messages and display
            allMessages = messages;
            displayMessage(newMessage);
            scrollToBottom();
        }

        function loadMessages() {
            allMessages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
            displayFilteredMessages(allMessages);
        }

        function displayFilteredMessages(messages) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            
            messages.forEach(message => {
                displayMessage(message);
            });
            
            scrollToBottom();
        }

        function displayMessage(message) {
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            const isCurrentUser = message.username === currentUser.username;
            const isSystemMessage = message.isSystemMessage || false;
            
            const messageDiv = document.createElement('div');
            
            if (isSystemMessage) {
                messageDiv.className = 'flex justify-center';
                const messageContent = document.createElement('div');
                messageContent.className = 'bg-orange-500 text-white px-3 py-1 rounded-full text-sm font-medium';
                
                const messageTime = new Date(message.timestamp).toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                messageContent.innerHTML = `${message.message} <span class="text-xs opacity-75">${messageTime}</span>`;
                messageDiv.appendChild(messageContent);
            } else {
                messageDiv.className = `flex ${isCurrentUser ? 'justify-end' : 'justify-start'}`;
                
                const messageContent = document.createElement('div');
                messageContent.className = `max-w-xs sm:max-w-md px-3 py-2 sm:px-4 rounded-lg message-content ${
                    isCurrentUser 
                        ? 'bg-blue-600 text-white' 
                        : 'bg-gray-100 text-gray-800'
                }`;
                
                const messageTime = new Date(message.timestamp).toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // Build message content based on type
                let messageBody = '';
                const messageType = message.messageType || 'text';
                
                if (messageType === 'file' && message.fileAttachment) {
                    messageBody = `
                        <div class="mt-2 p-2 bg-gray-50 rounded border border-gray-200">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-2 file-attachment">
                                <span class="text-xl sm:text-2xl">🗃️🔗</span>
                                <div class="flex-1 mt-1 sm:mt-0">
                                    <div class="text-xs sm:text-sm font-medium break-all">${message.fileAttachment.name}</div>
                                    <div class="text-xs text-gray-500">${formatFileSize(message.fileAttachment.size)}</div>
                                </div>
                                <button onclick="downloadFile('${message.fileAttachment.data}', '${message.fileAttachment.name}')" 
                                        class="bg-blue-500 text-white px-2 py-1 sm:px-2 sm:py-1 rounded text-xs hover:bg-blue-600 btn-touch">
                                    Download
                                </button>
                            </div>
                            ${message.fileAttachment.type.startsWith('image/') ? 
                                `<img src="${message.fileAttachment.data}" class="mt-2 max-w-full rounded" alt="Image">` : ''}
                            ${message.fileAttachment.type.startsWith('video/') ? 
                                `<video src="${message.fileAttachment.data}" controls class="mt-2 max-w-full rounded"></video>` : ''}
                        </div>
                    `;
                } else if (messageType === 'voice' && message.voiceNote) {
                    messageBody = `
                        <div class="mt-2 p-2 bg-gray-50 rounded border border-gray-200">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-2 voice-note">
                                <span class="text-xl sm:text-2xl">🎙️</span>
                                <audio src="${message.voiceNote.data}" controls class="flex-1 mt-2 sm:mt-0"></audio>
                            </div>
                        </div>
                    `;
                } else if (messageType === 'video' && message.videoAttachment) {
                    messageBody = `
                        <div class="mt-2 p-2 bg-gray-50 rounded border border-gray-200">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-2">
                                <span class="text-xl sm:text-2xl">🎥</span>
                                <video src="${message.videoAttachment.data}" controls class="flex-1 mt-2 sm:mt-0 max-h-64 rounded"></video>
                            </div>
                        </div>
                    `;
                } else {
                    messageBody = `<div class="mt-1">${message.message}</div>`;
                }
                
                messageContent.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="font-medium text-sm ${isCurrentUser ? 'text-blue-100' : 'text-gray-600'}">
                            ${message.username}:
                        </div>
                        ${isCurrentUser ? `
                            <button onclick="deleteMessage(${message.id})" 
                                    class="bg-red-600 hover:bg-red-700 text-white text-xs ml-2 px-2 py-1 rounded delete-btn">
                                delete
                            </button>
                        ` : ''}
                    </div>
                    ${messageBody}
                    <div class="text-xs ${isCurrentUser ? 'text-blue-200' : 'text-gray-500'} mt-1">
                        ${messageTime}
                    </div>
                `;
                
                messageDiv.appendChild(messageContent);
            }
            
            document.getElementById('chatMessages').appendChild(messageDiv);
        }

        function deleteMessage(messageId) {
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            
            // Get all messages
            const messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
            
            // Find the message to delete
            const messageToDelete = messages.find(msg => msg.id === messageId);
            
            // Security check: only allow deletion of own messages
            if (!messageToDelete || messageToDelete.username !== currentUser.username) {
                console.error('Unauthorized: Cannot delete other users messages');
                return;
            }
            
            // Remove the message
            const updatedMessages = messages.filter(msg => msg.id !== messageId);
            
            // Save updated messages
            localStorage.setItem(MESSAGES_KEY, JSON.stringify(updatedMessages));
            
            // Reload messages to refresh the display
            loadMessages();
        }

        function updateMembersCount() {
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            document.getElementById('membersCount').textContent = users.length;
        }

        function loadMembersList() {
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            const membersContainer = document.getElementById('membersContainer');
            
            membersContainer.innerHTML = '';
            
            users.forEach(user => {
                const memberDiv = document.createElement('div');
                const isCurrentUser = user.username === currentUser.username;
                
                memberDiv.className = `px-3 py-1 rounded-full text-sm font-medium ${
                    isCurrentUser 
                        ? 'bg-blue-600 text-white' 
                        : 'bg-gray-200 text-gray-700'
                }`;
                
                memberDiv.textContent = `${user.fullName} (@${user.username})`;
                membersContainer.appendChild(memberDiv);
            });
        }

        function toggleMembersList() {
            const membersList = document.getElementById('membersList');
            membersList.classList.toggle('hidden');
            
            // Update members list when showing
            if (!membersList.classList.contains('hidden')) {
                loadMembersList();
            }
        }

        // File handling functions
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('filePreview').classList.remove('hidden');
                document.getElementById('fileInfo').textContent = `${file.name} (${formatFileSize(file.size)})`;
            }
        }

        function clearFile() {
            selectedFile = null;
            document.getElementById('filePreview').classList.add('hidden');
            document.getElementById('fileInput').value = '';
        }

        function downloadFile(data, filename) {
            const link = document.createElement('a');
            link.href = data;
            link.download = filename;
            link.click();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Voice recording functions
        async function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    voiceBlob = new Blob(chunks, { type: 'audio/webm' });
                    showVoicePreview();
                };

                mediaRecorder.start();
                isRecording = true;
                updateRecordButton();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Please allow microphone access to record voice notes.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                updateRecordButton();
            }
        }

        function updateRecordButton() {
            const button = document.getElementById('recordButton');
            if (isRecording) {
                button.textContent = '⏹️ Stop';
                button.className = 'bg-red-600 text-white px-3 py-2 rounded-md hover:bg-red-700 transition duration-200 font-medium text-sm';
            } else {
                button.textContent = '🎙️ Record';
                button.className = 'bg-orange-500 text-white px-3 py-2 rounded-md hover:bg-orange-600 transition duration-200 font-medium text-sm';
            }
        }

        function showVoicePreview() {
            document.getElementById('voicePreview').classList.remove('hidden');
            const audio = document.getElementById('voiceAudio');
            audio.src = URL.createObjectURL(voiceBlob);
        }

        function clearVoice() {
            voiceBlob = null;
            document.getElementById('voicePreview').classList.add('hidden');
            document.getElementById('voiceAudio').src = '';
            if (isRecording) {
                stopRecording();
            }
        }

        // Video recording functions
        async function toggleVideoRecording() {
            if (!isVideoRecording) {
                startVideoRecording();
            } else {
                stopVideoRecording();
            }
        }

        async function startVideoRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: true 
                });
                videoRecorder = new MediaRecorder(stream);
                const chunks = [];

                videoRecorder.ondataavailable = (e) => chunks.push(e.data);
                videoRecorder.onstop = () => {
                    videoBlob = new Blob(chunks, { type: 'video/webm' });
                    showVideoPreview();
                };

                videoRecorder.start();
                isVideoRecording = true;
                updateVideoRecordButton();
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Please allow camera and microphone access to record video messages.');
            }
        }

        function stopVideoRecording() {
            if (videoRecorder && isVideoRecording) {
                videoRecorder.stop();
                videoRecorder.stream.getTracks().forEach(track => track.stop());
                isVideoRecording = false;
                updateVideoRecordButton();
            }
        }

        function updateVideoRecordButton() {
            const button = document.getElementById('videoRecordButton');
            if (isVideoRecording) {
                button.textContent = '⏹️ Stop';
                button.className = 'bg-red-600 text-white px-3 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-red-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch';
            } else {
                button.textContent = '🎥videoChat';
                button.className = 'bg-purple-600 text-white px-3 py-2 sm:px-3 sm:py-2 rounded-md hover:bg-purple-700 transition duration-200 font-medium text-xs sm:text-sm btn-touch';
            }
        }

        function showVideoPreview() {
            document.getElementById('videoPreview').classList.remove('hidden');
            const video = document.getElementById('videoPreviewPlayer');
            video.src = URL.createObjectURL(videoBlob);
        }

        function clearVideo() {
            videoBlob = null;
            document.getElementById('videoPreview').classList.add('hidden');
            document.getElementById('videoPreviewPlayer').src = '';
            if (isVideoRecording) {
                stopVideoRecording();
            }
        }

        // Search functions
        function handleSearch(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (!searchTerm) {
                displayFilteredMessages(allMessages);
                return;
            }

            const filteredMessages = allMessages.filter(message => {
                if (message.isSystemMessage) return false;
                
                const matchesUsername = message.username.toLowerCase().includes(searchTerm);
                const matchesFullName = message.fullName.toLowerCase().includes(searchTerm);
                const matchesMessage = message.message && message.message.toLowerCase().includes(searchTerm);
                const matchesFileName = message.fileAttachment && 
                    message.fileAttachment.name.toLowerCase().includes(searchTerm);
                
                return matchesUsername || matchesFullName || matchesMessage || matchesFileName;
            });

            displayFilteredMessages(filteredMessages);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayFilteredMessages(allMessages);
        }

        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
